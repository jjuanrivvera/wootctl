# .github/workflows/ci.yml — copied into a generated CLI by cliwright (GOAL.md §6).
# CI runs the DETERMINISTIC acceptance gate (`make verify`): build, test, lint, spec-check,
# spec-completeness, coverage, and the Definition-of-Done checks. It never runs `make judge`
# (the LLM-scored gate) — that needs an agent and is a build-acceptance-time step only.
# Key trap: build golangci-lint/gosec/govulncheck from source with the job's Go, not a pinned
# prebuilt action (an old scanner can't compile under a newer Go toolchain).
name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions: { contents: read }

jobs:
  verify:
    # The single source of truth for "is it green": the same `make verify` a dev runs locally.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # tags for the version stamp; full tree for spec-check
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - name: gofmt (fail on unformatted)
        run: gofmt -l . | tee /dev/stderr | (! read)
      - name: golangci-lint (from source, this job's Go)
        # Built from source rather than via the action: the prebuilt binaries lag the Go
        # toolchain and can't analyze a newer-Go module.
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: install ripgrep (dod-check.sh greps the source with rg)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: make verify (deterministic gate — no judge)
        run: make verify
      - name: docs-gen drift check
        run: make docs-gen && git diff --exit-code -- docs/commands

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - name: govulncheck (blocking)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec (high-severity gate)
        # Built from source with this job's Go for the same reason as golangci-lint: the pinned
        # prebuilt action lagged the toolchain and could no longer parse a newer-Go module.
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity high -confidence medium ./...

  test:
    # Cross-platform race + coverage. Windows is in the matrix so path/tempdir/pipe portability
    # regressions fail here rather than in the wild.
    strategy:
      matrix: { os: [ubuntu-latest, macos-latest, windows-latest] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: go test -race ./... -coverprofile=coverage.out
      - name: coverage gate (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: ./scripts/cover-check.sh 80
      - if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # tags, so goreleaser derives a version (not 0.0.0-SNAPSHOT)
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      # syft must be on PATH for the SBOM step; provide it so the snapshot can't fail on it.
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v6
        with: { args: check }
      - uses: goreleaser/goreleaser-action@v6
        with: { args: release --snapshot --clean --skip=sign,docker }
